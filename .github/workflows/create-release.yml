name: Create v1.0.0 Release

on:
  workflow_dispatch:

permissions: write-all

jobs:
  release:
    name: Tag, release, and update repo metadata
    runs-on: ubuntu-latest
    steps:
      - name: Create tag v1.0.0 (idempotent)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/v1.0.0',
                sha: '2c84ff09191a1e10724ee81e2ebc361bd44e5212'
              });
              console.log('Tag v1.0.0 created');
            } catch (e) {
              if (e.status === 422) {
                console.log('Tag already exists');
              } else { throw e; }
            }

      - name: Create GitHub Release (idempotent)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              'Initial public release.',
              '',
              'Nine-haiku born-digital haiga space, self-contained in `index.html`.',
              '',
              '- Live work: https://mozareeduge.github.io/winter-road/',
              '- Citation: see [`CITATION.cff`](https://github.com/mozareeduge/winter-road/blob/v1.0.0/CITATION.cff)',
              '- Rights: see [`RIGHTS.md`](https://github.com/mozareeduge/winter-road/blob/v1.0.0/RIGHTS.md)'
            ].join('\n');
            try {
              const r = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'v1.0.0',
                name: 'v1.0.0 — Winter Road: A Haiga Space',
                body: body,
                draft: false,
                prerelease: false
              });
              console.log('Release created:', r.data.html_url);
            } catch (e) {
              if (e.status === 422) {
                console.log('Release already exists');
              } else { throw e; }
            }

      - name: Update repository description and homepage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Token length: ${#GH_TOKEN}"
          response=$(curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/mozareeduge/winter-road" \
            -d '{"description":"Winter Road — a digital haiga space by mozare.","homepage":"https://mozareeduge.github.io/winter-road/"}')
          echo "Response: $response" | head -c 500
          echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print('desc:', d.get('description'), 'home:', d.get('homepage'))" 2>/dev/null || echo "(parse failed)"

      - name: Update repository topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/mozareeduge/winter-road/topics" \
            -d '{"names":["electronic-literature","digital-poetry","haiku","haiga","interactive-poetry","born-digital"]}' | head -c 300
